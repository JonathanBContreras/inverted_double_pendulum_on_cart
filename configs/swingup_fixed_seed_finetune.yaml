env:
  reset_mode: hanging
  max_episode_steps: 1500
  terminate_on_angle: false
  angle_termination_radians: 3.141592653589793
  success_angle_radians: 0.20943951023931953
  success_velocity_radians_per_second: 1.0
  success_hold_steps: 100
  position_reward_weight: 0.06
  velocity_reward_weight: 0.002
  action_reward_weight: 0.001
  boundary_reward_weight: 0.6
  hold_reward: 0.12
  upright_reward: 1.6
  success_bonus: 14.0
  failure_penalty: 30.0
  handoff_angle_radians: 0.35
  handoff_velocity_radians_per_second: 3.5
  handoff_cart_margin: 0.35
  handoff_bonus: 18.0
  handoff_velocity_penalty_weight: 0.16
  handoff_angle_band_radians: 0.60

physics:
  gravity: 9.80665
  cart_mass: 1.0
  link1_mass: 0.1
  link2_mass: 0.1
  link1_length: 0.5
  link2_length: 0.5
  track_limit: 2.4
  max_force: 20.0
  dt: 0.02
  initial_angle_range: 0.08
  initial_angular_velocity_range: 0.5
  initial_cart_position_range: 0.05
  initial_cart_velocity_range: 0.05

training:
  seed: 61
  total_steps: 2000000
  rollout_steps: 256
  num_envs: 16
  update_epochs: 8
  minibatch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.10
  entropy_coef: 0.0005
  value_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.012
  normalize_advantages: true
  eval_every_updates: 5
  eval_episodes: 5
  success_threshold: 0.2
  learning_rate: 0.00005
  hidden_sizes: [256, 256]
  initial_log_std: -0.2
  reset_states_path: runs/hybrid_10of10/fixed_seed_reset_states.npy
  save_every_updates: 5
  curriculum_stages: []
