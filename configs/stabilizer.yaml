env:
  reset_mode: upright
  max_episode_steps: 1000
  terminate_on_angle: true
  angle_termination_radians: 0.9
  success_angle_radians: 0.20943951023931953
  success_velocity_radians_per_second: 1.0
  success_hold_steps: 100
  position_reward_weight: 0.05
  velocity_reward_weight: 0.004
  action_reward_weight: 0.001
  boundary_reward_weight: 0.5
  hold_reward: 0.35
  upright_reward: 3.0
  success_bonus: 30.0
  failure_penalty: 35.0
  handoff_angle_radians: 0.35
  handoff_velocity_radians_per_second: 3.5
  handoff_cart_margin: 0.35
  handoff_bonus: 0.0
  handoff_velocity_penalty_weight: 0.0
  handoff_angle_band_radians: 0.45

physics:
  gravity: 9.80665
  cart_mass: 1.0
  link1_mass: 0.1
  link2_mass: 0.1
  link1_length: 0.5
  link2_length: 0.5
  track_limit: 2.4
  max_force: 20.0
  dt: 0.02
  initial_angle_range: 0.35
  initial_angular_velocity_range: 8.0
  initial_cart_position_range: 0.2
  initial_cart_velocity_range: 1.0

training:
  seed: 23
  total_steps: 2000000
  rollout_steps: 256
  num_envs: 32
  update_epochs: 8
  minibatch_size: 1024
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.15
  entropy_coef: 0.004
  value_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  normalize_advantages: true
  eval_every_updates: 5
  eval_episodes: 5
  success_threshold: 0.2
  learning_rate: 0.0002
  hidden_sizes: [256, 256]
  initial_log_std: 1.0
  save_every_updates: 5
  curriculum_stages:
    - until_step: 250000
      reset_mode: upright
      angle_range: 0.04
      angular_velocity_range: 0.2
      cart_position_range: 0.03
      cart_velocity_range: 0.1
    - until_step: 550000
      reset_mode: upright
      angle_range: 0.08
      angular_velocity_range: 0.6
      cart_position_range: 0.05
      cart_velocity_range: 0.2
    - until_step: 1000000
      reset_mode: upright
      angle_range: 0.15
      angular_velocity_range: 1.5
      cart_position_range: 0.1
      cart_velocity_range: 0.4
    - until_step: 1500000
      reset_mode: upright
      angle_range: 0.25
      angular_velocity_range: 3.5
      cart_position_range: 0.15
      cart_velocity_range: 0.6
    - until_step: 2000000
      reset_mode: upright
      angle_range: 0.35
      angular_velocity_range: 6.0
      cart_position_range: 0.2
      cart_velocity_range: 0.8
